# Configuration for CDK Ark Payment Processor
# This payment processor uses the Bark wallet for Ark protocol payments

# Backend type: ark
backend_type = "ark"

# Ark (Bark) backend configuration
[backend]
# BIP39 mnemonic - REQUIRED
# Generate with: cargo install bip39-cli && bip39 generate 12
mnemonic = "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"

# Ark server address (default: Second's signet server)
server_address = "https://ark.signet.2nd.dev"

# Esplora API address for on-chain data
esplora_address = "https://esplora.signet.2nd.dev"

# Bitcoin network: signet, testnet, mainnet
network = "signet"

# Data directory for SQLite database
data_dir = ".data/bark"

# gRPC server configuration
server_port = 50051

# TLS configuration (optional)
tls_enable = false
tls_cert_path = "certs/server.crt"
tls_key_path = "certs/server.key"

# HTTP/2 keep-alive settings (optional)
# keep_alive_interval = "30s"
# keep_alive_timeout = "10s"
# max_connection_age = "30m"
